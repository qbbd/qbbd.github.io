name: Extract ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "scratch-sb3-vault.zip"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip -o "scratch-sb3-vault.zip"

      - name: Remove ZIP
        run: rm "scratch-sb3-vault.zip"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Extract scratch-sb3-vault.zip"
          git push
