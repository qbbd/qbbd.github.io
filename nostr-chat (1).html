<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <link rel="shortcut icon" href="https://scratch.mit.edu/favicon.ico">
  <link rel="stylesheet" href="https://scratch.mit.edu/css/lib/normalize.min.css">
  <link rel="stylesheet" href="https://scratch.mit.edu/common.css">
  <link rel="stylesheet" href="https://scratch.mit.edu/studio.css">
  <title>おそらく過疎スタ - nostr chat</title>
  <meta content="Nostrチャット" name="description">
  <meta content="おそらく過疎スタ" property="og:title">
  <meta content="Nostrリレーを使ったチャット" property="og:description">
  <style>
    .compose-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .compose-box textarea {
      resize: vertical;
      min-height: 48px;
      font-family: inherit;
      font-size: 14px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .compose-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .compose-row button {
      background: #4d97ff;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .compose-row button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }
    .status-pill {
      font-size: 12px;
      color: #575e75;
      padding: 3px 10px;
      border-radius: 12px;
      background: #eee;
    }
    .status-pill.connected { background: #d5f5e3; color: #1e7a46; }
    .status-pill.error { background: #fde2e2; color: #a33; }
    .login-btn {
      font-size: 12px;
      background: none;
      border: 1px solid #4d97ff;
      color: #4d97ff;
      border-radius: 14px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .comment-content { word-break: break-word; }
    .comment-time { color: #909090; }
    .room-select {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px 16px;
      font-size: 13px;
      color: #575e75;
    }
    .room-select input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }
    .room-select button {
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #4d97ff;
      background: #fff;
      color: #4d97ff;
      cursor: pointer;
      font-size: 13px;
    }
    .empty-state {
      padding: 32px;
      text-align: center;
      color: #909090;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="page studio-page">
      <nav class="" id="navigation">
        <div class="inner">
          <ul>
            <li class="logo">
              <a aria-label="Scratch" href="#"></a>
            </li>
            <li class="link create">
              <a href="#"><span>作る</span></a>
            </li>
            <li class="link explore">
              <a href="#"><span>見る</span></a>
            </li>
            <li class="link ideas">
              <a href="#"><span>アイデア</span></a>
            </li>
            <li class="link membership">
              <a href="#"><span>メンバーシップ</span></a>
            </li>
            <li class="search">
              <form class="form" novalidate="">
                <button class="button btn-search" aria-label="検索" type="submit"></button>
                <div class="form-group row search-wrapper no-label">
                  <div class="col-sm-9">
                    <input class="input" aria-label="検索" name="q" placeholder="検索" type="text" value="">
                  </div>
                </div>
              </form>
            </li>
            <li class="link right join">
              <a class="registrationLink" href="#"><span>Scratchに参加しよう</span></a>
            </li>
            <li class="link right login-item">
              <button id="nostr-login-btn" class="login-btn" style="margin-top:14px;">Nostr拡張でログイン</button>
            </li>
            <li class="link right login-item">
              <button id="guest-login-btn" class="login-btn" style="margin-top:14px;">ゲストとして投稿</button>
            </li>
          </ul>
        </div>
      </nav>
      <main id="view" class="">
        <div class="studio-shell">
          <div class="studio-info">
            <div class="studio-info-section">
              <div class="studio-title">むかしの過疎スタ (Nostr版)</div>
            </div>
            <div class="studio-info-section">
              <img class="studio-image" src="https://cdn2.scratch.mit.edu/get_image/gallery/32970524_170x100.png">
            </div>
            <div class="studio-info-section">
              <div class="uneditable studio-description">
                Nostrリレーに接続してリアルタイムでチャットできます。投稿にはNIP-07対応の拡張機能（Alby、nos2xなど）が必要です。
              </div>
            </div>
            <div class="studio-info-footer">
              <div class="studio-info-footer-stats">
                <div>
                  <span id="status-pill" class="status-pill">接続中...</span>
                </div>
                <div>
                  <span id="msg-count">メッセージ 0件</span>
                </div>
              </div>
            </div>
          </div>
          <div class="studio-tabs">
            <div>
              <div class="studio-compose-container">
                <div class="studio-header-container">
                  <h2><span>チャット</span></h2>
                </div>

                <div class="room-select">
                  <span>ルーム(タグ):</span>
                  <input id="room-tag-input" type="text" value="hatinohesaikyonow">
                  <button id="room-apply-btn">切り替え</button>
                </div>

                <div class="room-select" style="padding-top:0;">
                  <label style="display:flex;align-items:center;gap:4px;">
                    <input type="checkbox" id="guest-cookie-checkbox">
                    ゲストの鍵をこの端末のクッキーに保存する(次回も同じ人として投稿できます)
                  </label>
                </div>

                <div class="compose-box">
                  <textarea id="compose-text" placeholder="ログインしてメッセージを入力..." disabled></textarea>
                  <div class="compose-row">
                    <span id="login-status" style="font-size:12px;color:#909090;">未ログイン</span>
                    <button id="send-btn" disabled>投稿</button>
                  </div>
                  <div id="guest-notice" style="display:none;font-size:11px;color:#a67c00;">
                    ゲストモード: 一時的な鍵で投稿します。クッキー保存を選ばない場合、ページを閉じる/再読み込みすると鍵は失われます。
                  </div>
                </div>

                <div id="comments-list">
                  <div class="empty-state">読み込み中...</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <footer id="footer">
        <div class="inner">
          <h3>これより古いのを見たいときは検索</h3>
        </div>
      </footer>
    </div>
  </div>

<script type="module">
import { generateSecretKey, getPublicKey, finalizeEvent } from "https://esm.sh/nostr-tools@2.7.2/pure";

(function () {
  const RELAYS = [
    "wss://relay.damus.io",
    "wss://nos.lol",
    "wss://relay.nostr.band"
  ];

  let currentTag = "hatinohesaikyonow";
  let sockets = [];
  let events = new Map(); // id -> event
  let profiles = new Map(); // pubkey -> {name, picture}
  let profileReqSent = new Set();
  let pubkey = null;
  let mode = null; // "extension" | "guest"
  let guestSecretKey = null; // Uint8Array, in-memory only

  const listEl = document.getElementById("comments-list");
  const statusPill = document.getElementById("status-pill");
  const countEl = document.getElementById("msg-count");
  const composeText = document.getElementById("compose-text");
  const sendBtn = document.getElementById("send-btn");
  const loginBtn = document.getElementById("nostr-login-btn");
  const guestBtn = document.getElementById("guest-login-btn");
  const loginStatus = document.getElementById("login-status");
  const guestNotice = document.getElementById("guest-notice");
  const guestCookieCheckbox = document.getElementById("guest-cookie-checkbox");
  const roomInput = document.getElementById("room-tag-input");
  const roomApplyBtn = document.getElementById("room-apply-btn");

  const COOKIE_NAME = "nostr_guest_sk";

  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : null;
  }

  function deleteCookie(name) {
    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
  }

  function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  function hexToBytes(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) {
      bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    }
    return bytes;
  }

  function decodeHTML(str) {
    const textarea = document.createElement("textarea");
    textarea.innerHTML = str;
    return textarea.value;
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
  }

  function renderContent(raw) {
    let safe = escapeHTML(decodeHTML(raw));
    safe = linkify(safe);
    safe = safe.replace(/\n/g, "<br>");
    return safe;
  }

  function shortPub(pk) {
    return pk.slice(0, 8) + "…" + pk.slice(-4);
  }

  function avatarUrl(pk) {
    return "https://robohash.org/" + pk + ".png?set=set4&size=64x64";
  }

  function formatTime(unixSec) {
    const d = new Date(unixSec * 1000);
    return d.toLocaleString("ja-JP");
  }

  function setStatus(text, cls) {
    statusPill.textContent = text;
    statusPill.className = "status-pill" + (cls ? " " + cls : "");
  }

  function connectAll() {
    sockets.forEach(s => { try { s.close(); } catch (e) {} });
    sockets = [];
    events.clear();
    listEl.innerHTML = '<div class="empty-state">読み込み中...</div>';
    countEl.textContent = "メッセージ 0件";

    let connectedCount = 0;
    RELAYS.forEach(url => {
      let ws;
      try {
        ws = new WebSocket(url);
      } catch (e) {
        return;
      }
      sockets.push(ws);

      ws.onopen = () => {
        connectedCount++;
        setStatus("接続済み (" + connectedCount + "/" + RELAYS.length + ")", "connected");
        const subId = "chat-" + Math.random().toString(36).slice(2);
        const req = ["REQ", subId, { kinds: [1], "#t": [currentTag], limit: 100 }];
        ws.send(JSON.stringify(req));
      };

      ws.onmessage = (msg) => {
        let data;
        try { data = JSON.parse(msg.data); } catch (e) { return; }
        if (data[0] === "EVENT") {
          const ev = data[2];
          if (!events.has(ev.id)) {
            events.set(ev.id, ev);
            requestProfile(ev.pubkey, ws);
            renderAll();
          }
        }
      };

      ws.onerror = () => {
        setStatus("一部のリレーに接続できません", "error");
      };

      ws.onclose = () => {
        connectedCount = Math.max(0, connectedCount - 1);
      };
    });
  }

  function requestProfile(pk, ws) {
    if (profileReqSent.has(pk)) return;
    profileReqSent.add(pk);
    const subId = "profile-" + Math.random().toString(36).slice(2);
    try {
      ws.send(JSON.stringify(["REQ", subId, { kinds: [0], authors: [pk], limit: 1 }]));
    } catch (e) {}
  }

  // separately listen for kind 0 on all sockets
  function attachProfileListener() {
    sockets.forEach(ws => {
      const origHandler = ws.onmessage;
      ws.addEventListener("message", (msg) => {
        let data;
        try { data = JSON.parse(msg.data); } catch (e) { return; }
        if (data[0] === "EVENT" && data[2].kind === 0) {
          try {
            const meta = JSON.parse(data[2].content);
            profiles.set(data[2].pubkey, {
              name: meta.name || meta.display_name || shortPub(data[2].pubkey),
              picture: meta.picture || null
            });
            renderAll();
          } catch (e) {}
        }
      });
    });
  }

  function renderAll() {
    const sorted = Array.from(events.values()).sort((a, b) => b.created_at - a.created_at);
    countEl.textContent = "メッセージ " + sorted.length + "件";
    if (sorted.length === 0) {
      listEl.innerHTML = '<div class="empty-state">まだメッセージがありません</div>';
      return;
    }
    listEl.innerHTML = sorted.map(ev => {
      const prof = profiles.get(ev.pubkey);
      const name = prof ? prof.name : shortPub(ev.pubkey);
      const pic = prof && prof.picture ? prof.picture : avatarUrl(ev.pubkey);
      return `
      <div class="flex-row comment-container">
        <div class="flex-row comment" id="comments-${ev.id}">
          <div class="avatar-wrapper">
            <img class="avatar" src="${pic}" onerror="this.src='${avatarUrl(ev.pubkey)}'">
          </div>
          <div class="flex-row comment-body column">
            <div class="flex-row comment-top-row">
              <span class="username">${escapeHTML(name)}</span>
            </div>
            <div class="comment-bubble">
              <span class="comment-content">${renderContent(ev.content)}</span>
              <div class="flex-row comment-bottom-row">
                <span class="comment-time">${formatTime(ev.created_at)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  async function login() {
    if (!window.nostr) {
      alert("NIP-07対応の拡張機能（Alby、nos2xなど）がインストールされていません。ゲストとして投稿することもできます。");
      return;
    }
    try {
      pubkey = await window.nostr.getPublicKey();
      mode = "extension";
      loginStatus.textContent = "ログイン中: " + shortPub(pubkey);
      composeText.disabled = false;
      composeText.placeholder = "メッセージを入力...";
      sendBtn.disabled = false;
      loginBtn.textContent = "ログイン済み";
      loginBtn.disabled = true;
      guestBtn.disabled = true;
      guestNotice.style.display = "none";
    } catch (e) {
      alert("ログインに失敗しました: " + e.message);
    }
  }

  function loginAsGuest() {
    guestSecretKey = generateSecretKey();
    pubkey = getPublicKey(guestSecretKey);
    mode = "guest";
    if (guestCookieCheckbox.checked) {
      setCookie(COOKIE_NAME, bytesToHex(guestSecretKey), 365);
    }
    applyGuestLoggedInUI();
  }

  function applyGuestLoggedInUI() {
    loginStatus.textContent = "ゲスト: " + shortPub(pubkey);
    composeText.disabled = false;
    composeText.placeholder = "メッセージを入力...";
    sendBtn.disabled = false;
    guestBtn.textContent = "ゲストログイン済み";
    guestBtn.disabled = true;
    loginBtn.disabled = true;
    guestNotice.style.display = "block";
    guestCookieCheckbox.disabled = true;
  }

  function tryRestoreGuestFromCookie() {
    const hex = getCookie(COOKIE_NAME);
    if (!hex) return;
    try {
      guestSecretKey = hexToBytes(hex);
      pubkey = getPublicKey(guestSecretKey);
      mode = "guest";
      guestCookieCheckbox.checked = true;
      applyGuestLoggedInUI();
      loginStatus.textContent = "ゲスト(保存済み): " + shortPub(pubkey);
    } catch (e) {
      deleteCookie(COOKIE_NAME);
    }
  }

  async function sendMessage() {
    const content = composeText.value.trim();
    if (!content || !pubkey || !mode) return;
    sendBtn.disabled = true;

    const unsigned = {
      kind: 1,
      created_at: Math.floor(Date.now() / 1000),
      tags: [["t", currentTag]],
      content: content,
      pubkey: pubkey
    };

    try {
      let signed;
      if (mode === "extension") {
        signed = await window.nostr.signEvent(unsigned);
      } else {
        signed = finalizeEvent(unsigned, guestSecretKey);
      }
      sockets.forEach(ws => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(["EVENT", signed]));
        }
      });
      events.set(signed.id, signed);
      renderAll();
      composeText.value = "";
    } catch (e) {
      alert("投稿に失敗しました: " + e.message);
    } finally {
      sendBtn.disabled = false;
    }
  }

  loginBtn.addEventListener("click", login);
  guestBtn.addEventListener("click", loginAsGuest);
  sendBtn.addEventListener("click", sendMessage);
  composeText.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      sendMessage();
    }
  });
  roomApplyBtn.addEventListener("click", () => {
    const val = roomInput.value.trim();
    if (val) {
      currentTag = val;
      profileReqSent.clear();
      connectAll();
      setTimeout(attachProfileListener, 300);
    }
  });

  connectAll();
  setTimeout(attachProfileListener, 300);
  tryRestoreGuestFromCookie();
})();
</script>
</body>
</html>
