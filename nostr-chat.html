      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
    }

      min-height: 48px;
      font-family: inherit;

      padding: 8px;

      border-radius: 6px;

    .compose-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .compose-row button {
      background: #4d97ff;
      color: #fff;
      border: none;
      border-radius: 20px;

      font-weight: bold;

    .compose-row button:disabled {

      cursor: not-allowed;

    .status-pill {
      font-size: 12px;

      border-radius: 12px;
      background: #eee;

    .login-btn {
      font-size: 12px;

    .room-select {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px 16px;

      color: #575e75;
    }
    .room-select input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #ccc;

      font-size: 13px;
    }
    .room-select button {
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #4d97ff;
      background: #fff;
      color: #4d97ff;
      cursor: pointer;
      font-size: 13px;
    }
    .block-btn {
      background: none;
      border: none;
      color: #b0b0b0;
      font-size: 11px;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .comment:hover .block-btn {
      opacity: 1;
    }
    .block-btn:hover { color: #d33; }
    .unblock-btn {
      background: none;
      border: none;
      color: #4d97ff;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      padding: 0 4px;
    }

</head>

<script type="module">
import { generateSecretKey, getPublicKey, finalizeEvent, getEventHash } from "https://esm.sh/nostr-tools@2.7.2/pure";

(function () {
  const RELAYS = [
    "wss://relay.damus.io",
    "wss://nos.lol",
    "wss://relay.nostr.band"
  ];

  let currentTag = "hatinohesaikyonow";
  let sockets = [];
  let events = new Map(); // id -> event
  let profiles = new Map(); // pubkey -> {name, picture}
  let profileReqSent = new Set();
  let pubkey = null;
  let mode = null; // "extension" | "guest"
  let guestSecretKey = null; // Uint8Array, in-memory only
  let blockedPubkeys = new Set();

  const listEl = document.getElementById("comments-list");
  const statusPill = document.getElementById("status-pill");
  const countEl = document.getElementById("msg-count");
  const composeText = document.getElementById("compose-text");
  const sendBtn = document.getElementById("send-btn");
  const loginBtn = document.getElementById("nostr-login-btn");
  const guestBtn = document.getElementById("guest-login-btn");
  const loginStatus = document.getElementById("login-status");
  const guestNotice = document.getElementById("guest-notice");
  const guestCookieCheckbox = document.getElementById("guest-cookie-checkbox");
  const roomInput = document.getElementById("room-tag-input");
  const roomApplyBtn = document.getElementById("room-apply-btn");
  const blockedListWrapper = document.getElementById("blocked-list-wrapper");
  const blockedListEl = document.getElementById("blocked-list");
  const powDifficultySelect = document.getElementById("pow-difficulty");
  const powStatusEl = document.getElementById("pow-status");
  const powRelayReqEl = document.getElementById("pow-relay-req");

  const BLOCK_COOKIE_NAME = "nostr_blocked_pubkeys";
  const GUEST_CREATE_COOKIE_NAME = "nostr_guest_last_created";
  const GUEST_CREATE_COOLDOWN_MS = 5 * 60 * 1000; // 5分
  const POST_COOLDOWN_MS = 5 * 1000; // 5秒
  let lastPostAt = 0;
  let postCooldownTimer = null;

  const COOKIE_NAME = "nostr_guest_sk";

  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + expires + "; path=/; SameSite=Lax";
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : null;
  }

  function deleteCookie(name) {
    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
  }

  function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  function hexToBytes(hex) {
    const bytes = new Uint8Array(hex.length / 2);
    for (let i = 0; i < bytes.length; i++) {
      bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
    }
    return bytes;
  }

  function decodeHTML(str) {
    const textarea = document.createElement("textarea");
    textarea.innerHTML = str;
    return textarea.value;
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
  }

  function renderContent(raw) {
    let safe = escapeHTML(decodeHTML(raw));
    safe = linkify(safe);
    safe = safe.replace(/\n/g, "<br>");
    return safe;
  }

  function shortPub(pk) {
    return pk.slice(0, 8) + "…" + pk.slice(-4);
  }

  function avatarUrl(pk) {
    return "https://robohash.org/" + pk + ".png?set=set4&size=64x64";
  }

  function formatTime(unixSec) {
    const d = new Date(unixSec * 1000);
    return d.toLocaleString("ja-JP");
  }

  function setStatus(text, cls) {
    statusPill.textContent = text;
    statusPill.className = "status-pill" + (cls ? " " + cls : "");
  }

  function saveBlockedToCookie() {
    setCookie(BLOCK_COOKIE_NAME, JSON.stringify(Array.from(blockedPubkeys)), 365);
  }

  function loadBlockedFromCookie() {
    const raw = getCookie(BLOCK_COOKIE_NAME);
    if (!raw) return;
    try {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) {
        arr.forEach(pk => blockedPubkeys.add(pk));
      }
    } catch (e) {}
  }

  function blockUser(pk) {
    if (pk === pubkey) return;
    blockedPubkeys.add(pk);
    saveBlockedToCookie();
    renderBlockedList();
    renderAll();
  }

  function unblockUser(pk) {
    blockedPubkeys.delete(pk);
    saveBlockedToCookie();
    renderBlockedList();
    renderAll();
  }

  function renderBlockedList() {
    if (blockedPubkeys.size === 0) {
      blockedListWrapper.style.display = "none";
      return;
    }
    blockedListWrapper.style.display = "block";
    blockedListEl.innerHTML = Array.from(blockedPubkeys).map(pk => {
      const prof = profiles.get(pk);
      const name = prof ? prof.name : shortPub(pk);
      return `${escapeHTML(name)} <button class="unblock-btn" data-pk="${pk}">解除</button>`;
    }).join(" / ");
    blockedListEl.querySelectorAll(".unblock-btn").forEach(btn => {
      btn.addEventListener("click", () => unblockUser(btn.dataset.pk));
    });
  }

  window.__handleBlockClick = function (pk) {
    if (confirm("このユーザーの投稿を今後表示しないようにしますか？")) {
      blockUser(pk);
    }
  };

  function leadingZeroBits(hex) {
    let bits = 0;
    for (let i = 0; i < hex.length; i++) {
      const nibble = parseInt(hex[i], 16);
      if (nibble === 0) {
        bits += 4;
      } else {
        bits += Math.clz32(nibble) - 28;
        break;
      }
    }
    return bits;
  }

  function mineEvent(baseEvent, difficulty, onProgress) {
    return new Promise((resolve, reject) => {
      if (difficulty <= 0) {
        resolve(baseEvent);
        return;
      }
      let nonce = 0;
      const tags = baseEvent.tags.filter(t => t[0] !== "nonce");
      const nonceTagIndex = tags.length;
      tags.push(["nonce", "0", String(difficulty)]);
      const candidate = { ...baseEvent, tags };

      function step() {
        const batchStart = nonce;
        for (let i = 0; i < 800; i++) {
          candidate.tags[nonceTagIndex][1] = String(nonce);
          const id = getEventHash(candidate);
          if (leadingZeroBits(id) >= difficulty) {
            resolve(candidate);
            return;
          }
          nonce++;
        }
        onProgress(nonce);
        setTimeout(step, 0);
      }
      step();
    });
  }

  let detectedMinPow = 0;

  function relayHttpUrl(wsUrl) {
    return wsUrl.replace(/^wss:\/\//, "https://").replace(/^ws:\/\//, "http://");
  }

  async function fetchRelayInfo(wsUrl) {
    try {
      const res = await fetch(relayHttpUrl(wsUrl), {
        headers: { "Accept": "application/nostr+json" }
      });
      if (!res.ok) return null;
      const info = await res.json();
      return info;
    } catch (e) {
      return null; // CORS未対応や取得失敗は無視
    }
  }

  async function detectMinPowAcrossRelays() {
    const results = await Promise.all(RELAYS.map(fetchRelayInfo));
    let maxMin = 0;
    const perRelay = [];
    results.forEach((info, i) => {
      const val = info && info.limitation && typeof info.limitation.min_pow_difficulty === "number"
        ? info.limitation.min_pow_difficulty
        : 0;
      perRelay.push({ relay: RELAYS[i], min: val, ok: info !== null });
      if (val > maxMin) maxMin = val;
    });
    detectedMinPow = maxMin;
    applyMinPowToUI(perRelay);
  }

  function applyMinPowToUI(perRelay) {
    // 既存の選択肢のうち検出した最低難易度未満は無効化
    Array.from(powDifficultySelect.options).forEach(opt => {
      const v = parseInt(opt.value, 10);
      opt.disabled = v < detectedMinPow;
    });
    // 最低難易度にちょうど合う選択肢がなければ追加
    if (detectedMinPow > 0 && !Array.from(powDifficultySelect.options).some(o => parseInt(o.value, 10) === detectedMinPow)) {
      const newOpt = document.createElement("option");
      newOpt.value = String(detectedMinPow);
      newOpt.textContent = detectedMinPow + "bit(リレー最低要件)";
      powDifficultySelect.appendChild(newOpt);
    }
    // 現在選択中の値がリレー要件を満たさない場合は自動的に引き上げ
    if (parseInt(powDifficultySelect.value, 10) < detectedMinPow) {
      powDifficultySelect.value = String(detectedMinPow);
    }

    if (detectedMinPow > 0) {
      const known = perRelay.filter(r => r.ok);
      powRelayReqEl.style.display = "block";
      powRelayReqEl.textContent = "⚠️ 接続中のリレーのうち最も厳しいもので " + detectedMinPow + "bit のPoWが必須です(自動検出、" + known.length + "/" + perRelay.length + " リレーから情報取得成功)";
    } else {
      powRelayReqEl.style.display = "none";
    }
  }

  function connectAll() {
    sockets.forEach(s => { try { s.close(); } catch (e) {} });
    sockets = [];
    events.clear();
    listEl.innerHTML = '<div class="empty-state">読み込み中...</div>';
    countEl.textContent = "メッセージ 0件";

    let connectedCount = 0;
    RELAYS.forEach(url => {
      let ws;
      try {
        ws = new WebSocket(url);
      } catch (e) {
        return;
      }
      sockets.push(ws);

      ws.onopen = () => {
        connectedCount++;
        setStatus("接続済み (" + connectedCount + "/" + RELAYS.length + ")", "connected");
        const subId = "chat-" + Math.random().toString(36).slice(2);
        const req = ["REQ", subId, { kinds: [1], "#t": [currentTag], limit: 100 }];
        ws.send(JSON.stringify(req));
      };

      ws.onmessage = (msg) => {
        let data;
        try { data = JSON.parse(msg.data); } catch (e) { return; }
        if (data[0] === "EVENT") {
          const ev = data[2];
          if (!events.has(ev.id)) {
            events.set(ev.id, ev);
            requestProfile(ev.pubkey, ws);
            renderAll();
          }
        }
      };

      ws.onerror = () => {
        setStatus("一部のリレーに接続できません", "error");
      };

      ws.onclose = () => {
        connectedCount = Math.max(0, connectedCount - 1);
      };
    });
  }

  function requestProfile(pk, ws) {
    if (profileReqSent.has(pk)) return;
    profileReqSent.add(pk);
    const subId = "profile-" + Math.random().toString(36).slice(2);
    try {
      ws.send(JSON.stringify(["REQ", subId, { kinds: [0], authors: [pk], limit: 1 }]));
    } catch (e) {}
  }

  // separately listen for kind 0 on all sockets
  function attachProfileListener() {
    sockets.forEach(ws => {
      const origHandler = ws.onmessage;
      ws.addEventListener("message", (msg) => {
        let data;
        try { data = JSON.parse(msg.data); } catch (e) { return; }
        if (data[0] === "EVENT" && data[2].kind === 0) {
          try {
            const meta = JSON.parse(data[2].content);
            profiles.set(data[2].pubkey, {
              name: meta.name || meta.display_name || shortPub(data[2].pubkey),
              picture: meta.picture || null
            });
            renderAll();
          } catch (e) {}
        }
      });
    });
  }

  function renderAll() {
    const sorted = Array.from(events.values())
      .filter(ev => !blockedPubkeys.has(ev.pubkey))
      .sort((a, b) => b.created_at - a.created_at);
    countEl.textContent = "メッセージ " + sorted.length + "件";
    if (sorted.length === 0) {
      listEl.innerHTML = '<div class="empty-state">まだメッセージがありません</div>';
      return;
    }
    listEl.innerHTML = sorted.map(ev => {
      const prof = profiles.get(ev.pubkey);
      const name = prof ? prof.name : shortPub(ev.pubkey);
      const pic = prof && prof.picture ? prof.picture : avatarUrl(ev.pubkey);
      const isSelf = ev.pubkey === pubkey;
      return `
      <div class="flex-row comment-container">
        <div class="flex-row comment" id="comments-${ev.id}">
          <div class="avatar-wrapper">
            <img class="avatar" src="${pic}" onerror="this.src='${avatarUrl(ev.pubkey)}'">
          </div>
          <div class="flex-row comment-body column">
            <div class="flex-row comment-top-row">
              <span class="username">${escapeHTML(name)}</span>
              ${isSelf ? "" : `<button class="block-btn" onclick="__handleBlockClick('${ev.pubkey}')" title="このユーザーをブロック">🚫ブロック</button>`}
            </div>
            <div class="comment-bubble">
              <span class="comment-content">${renderContent(ev.content)}</span>
              <div class="flex-row comment-bottom-row">
                <span class="comment-time">${formatTime(ev.created_at)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  async function login() {
    if (!window.nostr) {
      alert("NIP-07対応の拡張機能（Alby、nos2xなど）がインストールされていません。ゲストとして投稿することもできます。");
      return;
    }
    try {
      pubkey = await window.nostr.getPublicKey();
      mode = "extension";
      loginStatus.textContent = "ログイン中: " + shortPub(pubkey);
      composeText.disabled = false;
      composeText.placeholder = "メッセージを入力...";
      sendBtn.disabled = false;
      loginBtn.textContent = "ログイン済み";
      loginBtn.disabled = true;
      guestBtn.disabled = true;
      guestNotice.style.display = "none";
    } catch (e) {
      alert("ログインに失敗しました: " + e.message);
    }
  }

  function loginAsGuest() {
    const lastCreated = parseInt(getCookie(GUEST_CREATE_COOKIE_NAME) || "0", 10);
    const elapsed = Date.now() - lastCreated;
    if (lastCreated && elapsed < GUEST_CREATE_COOLDOWN_MS) {
      const remainSec = Math.ceil((GUEST_CREATE_COOLDOWN_MS - elapsed) / 1000);
      alert("新しいゲストアカウントの作成は5分に1回までです。あと" + remainSec + "秒お待ちください。\n(クッキーに保存済みの鍵がある場合は自動的に復元されます)");
      return;
    }
    guestSecretKey = generateSecretKey();
    pubkey = getPublicKey(guestSecretKey);
    mode = "guest";
    setCookie(GUEST_CREATE_COOKIE_NAME, String(Date.now()), 1);
    if (guestCookieCheckbox.checked) {
      setCookie(COOKIE_NAME, bytesToHex(guestSecretKey), 365);
    }
    applyGuestLoggedInUI();
  }

  function applyGuestLoggedInUI() {
    loginStatus.textContent = "ゲスト: " + shortPub(pubkey);
    composeText.disabled = false;
    composeText.placeholder = "メッセージを入力...";
    sendBtn.disabled = false;
    guestBtn.textContent = "ゲストログイン済み";
    guestBtn.disabled = true;
    loginBtn.disabled = true;
    guestNotice.style.display = "block";
    guestCookieCheckbox.disabled = true;
  }

  function tryRestoreGuestFromCookie() {
    const hex = getCookie(COOKIE_NAME);
    if (!hex) return;
    try {
      guestSecretKey = hexToBytes(hex);
      pubkey = getPublicKey(guestSecretKey);
      mode = "guest";
      guestCookieCheckbox.checked = true;
      applyGuestLoggedInUI();
      loginStatus.textContent = "ゲスト(保存済み): " + shortPub(pubkey);
    } catch (e) {
      deleteCookie(COOKIE_NAME);
    }
  }

  async function sendMessage() {
    const content = composeText.value.trim();
    if (!content || !pubkey || !mode) return;

    const elapsed = Date.now() - lastPostAt;
    if (elapsed < POST_COOLDOWN_MS) {
      const remainSec = Math.ceil((POST_COOLDOWN_MS - elapsed) / 1000);
      startCooldownCountdown(remainSec);
      return;
    }

    sendBtn.disabled = true;

    const unsigned = {
      kind: 1,
      created_at: Math.floor(Date.now() / 1000),
      tags: [["t", currentTag]],
      content: content,
      pubkey: pubkey
    };

    const difficulty = Math.max(parseInt(powDifficultySelect.value, 10) || 0, detectedMinPow);

    try {
      let eventToSign = unsigned;
      if (difficulty > 0) {
        powStatusEl.style.display = "block";
        powStatusEl.textContent = "⛏️ PoW計算中... (nonce: 0)";
        eventToSign = await mineEvent(unsigned, difficulty, (nonce) => {
          powStatusEl.textContent = "⛏️ PoW計算中... (nonce: " + nonce + ")";
        });
        powStatusEl.textContent = "✅ PoW完了(" + difficulty + "bit)";
        setTimeout(() => { powStatusEl.style.display = "none"; }, 1500);
      }

      let signed;
      if (mode === "extension") {
        signed = await window.nostr.signEvent(eventToSign);
      } else {
        signed = finalizeEvent(eventToSign, guestSecretKey);
      }
      sockets.forEach(ws => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(["EVENT", signed]));
        }
      });
      events.set(signed.id, signed);
      renderAll();
      composeText.value = "";
      lastPostAt = Date.now();
      startCooldownCountdown(Math.ceil(POST_COOLDOWN_MS / 1000));
    } catch (e) {
      alert("投稿に失敗しました: " + e.message);
      sendBtn.disabled = false;
      powStatusEl.style.display = "none";
    }
  }

  function startCooldownCountdown(seconds) {
    if (postCooldownTimer) clearInterval(postCooldownTimer);
    let remaining = seconds;
    sendBtn.disabled = true;
    sendBtn.textContent = remaining + "s";
    postCooldownTimer = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(postCooldownTimer);
        postCooldownTimer = null;
        sendBtn.disabled = false;
        sendBtn.textContent = "投稿";
      } else {
        sendBtn.textContent = remaining + "s";
      }
    }, 1000);
  }

  loginBtn.addEventListener("click", login);
  guestBtn.addEventListener("click", loginAsGuest);
  sendBtn.addEventListener("click", sendMessage);
  composeText.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      sendMessage();
    }
  });
  roomApplyBtn.addEventListener("click", () => {
    const val = roomInput.value.trim();
    if (val) {
      currentTag = val;
      profileReqSent.clear();
      connectAll();
      setTimeout(attachProfileListener, 300);
    }
  });

  connectAll();
  setTimeout(attachProfileListener, 300);
  tryRestoreGuestFromCookie();
  loadBlockedFromCookie();
  renderBlockedList();
  detectMinPowAcrossRelays();
})();
</script>
</body>
</html>
